name: Generate Demo GIF

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  generate-demo:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.21"

      - name: Install dependencies
        run: |
          go mod tidy
          mkdir -p build
          go build -o build/bubly main.go

      - name: Install VHS and dependencies
        run: |
          sudo apt update
          sudo apt install -y ffmpeg libvips-dev
          sudo apt install -y ttyd
          go install github.com/charmbracelet/vhs@latest

      - name: Install yt-dlp for demo run
        run: |
          mkdir -p bin
          curl -L "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp" -o bin/yt-dlp
          chmod +x bin/yt-dlp

      - name: Generate demo GIF
        run: |
          export PATH="$HOME/go/bin:$PATH"
          vhs < preview.tape

      - name: Upload demo GIF as artifact
        uses: actions/upload-artifact@v4
        with:
          name: preview
          path: preview.gif

      - name: Commit and push demo GIF
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add preview.gif
          git commit -m "Update demo GIF [skip ci]" || echo "No changes to commit"
          git push
